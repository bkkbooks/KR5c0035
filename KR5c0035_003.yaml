front:
  text: 太上洞神天公消魔護國經卷下
  hash: sha256:6be28cf7609971bed359cca20b16cc026c69391711188af12cee6aa07643569e
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0035_HFL_003-001a, image: hfl/0343/0343-094.png}
body:
  text: 統御品第三老君曰天公者天道公平無私也天父地毋玉皇大天帝也天地萬物既備元始大道退居無爲遂命玉皇統衘三界覆育蒼生公平無私也命地毋爲地后勑天官司天費勑地官司地府勑水官司水府又列四瀆五嶽名山大川洞府福地各勑仙官而主領又遣司命司録曰遊月行年月曰時四直使者虛空監察當境主司土地山神分司列職廵遶天下紏察是非故人間天子法象天地乃於中原建邦設都外布九州百郡四夷八蠻設春夏秋冬四時之官三公九卿文武百僚分司列職統衘天下夫天子者非世間之人也亰眞元精一之炁歴代降生在仙爲上仙在宿爲上宿皆受大道玉皇之命承運而下降承運而上昇皆天之歴數也是故北辰在上而衆星拱之天上有帝座星后妃星太子星庶子星三台星内座四輔星諸候星君基星臣基星民基星文星武星下有萬物上應萬星天地實大道之子萬物實大道之孫大道爲天地之始二儀爲萬物之根隂陽升降天地氣通然後播種百穀普濟蒼生大道乾坤功深莫測潜養萬物不徳不仁萬物知歸其功不宰故齋直以報大道天地之恩讃曰天父地毋后土玉皇天地既立三清退藏玉皇承命統衘萬方天地水府三官主張嶽瀆洞府衆仙之房司命司録曰遊月行年月日時四直神王巡遊天下紏察不祥人間天子建國立邦仰觀俯察乃搆明堂法天象地背隂向陽九州萬國四夷遐荒三台四輔文武百僚分司列職以收萬方無爲無事凝冕垂裳上仙上宿下爲帝王承天歴數上下無常北辰在上三台在旁后妃太子諸侯百王天子穆穆諸侯煌煌下育群品上奉天蒼功格天地降福降祥雲行雨施普潤無疆百榖有收萬物無傷大濟衆生千倉萬箱大道天地玄功無量故設天齋以賀平康老君曰夫人者皆稟妙道天地之氣而生故頭圓象天足方象地肉象土骨象石氣象風血象水眼象日月髮象草未聽象原洞言象雷呌寤象晝寐象夜行象雲坐象山喜象晴怒象雨五臓象五行四肢象四氣九竅象洞穴以應陽之數也且人生四肢五臓六腑動靜喜怒旣象天地豈不是妙道天地之氣所生哉老君曰凡人受胎即天降司命司録常來擁護以至生下男則萬神稱善女則萬神唱恭籍係三元名書上帝東斗注筭西斗記名北斗落死南斗上生元辰保命中斗延齡大道生之至徳畜之五行成之髙天覆之厚地載之曰月照之星辰祐之神明護之四氣運之風雨潤之絲綿夜之人倫奉之大樂和之大禮檢之大君臨之大道天地生育之功妙矣哉大矣哉至矣哉凡厥衆生若悟此者咸宜至心奉道篤敬天地父母曰月星辰上順天常下分地利父慈子孝兄友弟恭爲臣克忠爲君克聖大道垂祐天地降祥金液錬形長生乆視若輕侮大道不敬天地棄賤五榖枉費絲綿背道崇邪媱慾殺害訶風罵雨訾毀經文者則道不生天不覆地不載日月不照星辰不祐神明不護四氣不運風雨不調五榖不養絲綿不夜人倫不奉大樂不和大禮不檢大君不臨貧窮下賤疾病纒綿受業將盡司殺來誅既謝人寰沉淪地獄受諸苦掠痛毒難忍熱抱銅柱寒卧鐡床鋸刀傷吞火食炭永墮惡趣無有出期吾令爲汝及一切衆生説此妙經敬而奉之勤而行之即說讃曰大道乾坤生育爲理人及萬物咸禀一氣言之爲常驗之乃貴頭圓象夫足方象地肉土骨石氣風血水聲象雷鳴髮象草矣隂霾爲怒晴明象喜晝則象寤夜則象寐動似雲行坐如山止五臟四肢五行四炁擾擾蒼生戴髮含齒大道乾坤生爾育爾一切衆生退而自省男女媾精胞胎始營司命司録衞而降靈父之天氣母之地精十月脱胎子毋分形男則覆生女則偃生男則萬神稱善女則萬神怡情上係天曹中係星辰三元掌籍五帝司迎東斗主筭西斗記名此斗落死南斗上生元辰保命中斗延齡道德生育天地覆載三元照曜晝夜相代四時五行物無不賴五榖資生絲綿被體和之以樂檢之以禮天子稷穆人倫濟濟天地大道功深無裏上孝父毋下友兄弟用天之道亦無災沴勤奉天地長生罔逝反此而行致遠恐泥貧窮下賤疾病迍滯贜滿罪定司殺來制沉淪地獄永謝人世萬劫受殃莫之可計善男善女邪心永誓老君曰言此緾尊貴乃衆生謝過祈恩修眞之要可以本命元辰四時八節六齎十直之日或禳水早或祈五榖或祈福祐或謝過消災或解呪詛隨其所願䖍心至禱請正一三洞法師或一或二或三或五或七人隨力建功轉誦此經修齋行道福德立降消諸不祥或於三春天地發生之時或於秋冬萬物成熟之際焼香修奉開轉此經以荷大道天地生育之功天能聽卑道能通感録茲至禱咸賜福祥玄理深㣲威恩莫測敬之哉敬之哉凡修天公齎直須齋潔預禁葷辛掃洒宅院是事精潔大道天地鍳録誠懇切忌使常用之物及孝斗孕婦雞犬僧尼不潔之物犯傷天眞大道天地賞罰無私恭慢之應威不可當凡齎科供養之具直須事事豊足若稍輕慢上帝不歆反成殃累一切男女敬而愼之此天公勑邪神呪若有信心奉道善信男女凡欲持課先須燒香頂禮冥心三清上眞諸天天帝天父地毋日直香官土地靈祇然後叩齒三通誦之七遍自然靈應感徹天眞護持百邪不干萬罪消滅也太上說經既巳尹喜眞人及侍衞仙衆一時頂禮恭敬再拜動而奉行太上洞神天公消魔護國經卷下终
