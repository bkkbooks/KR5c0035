front:
  text: 太上洞神天公消魔護國經卷中
  hash: sha256:918b6646c96be5f7ebfb7856b2fde8f53f6b7520c256adefb32f2bbc431b63f3
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0035_SJB_002-110422b, image: sjb/11/110422b.png}
body:
  text: 應機品第二爾時太上老君於太清仙境靈寳殿中憑几而坐手執玉塵說法度人尹喜眞人十方仙衆金童玉女執節捧香列侍左右時有頂門金闕郎中引一靈官捧一朱書青函於瑶池前奏對奏訖進函逡延而返於是君喜眞人前進作禮上白老君曰喜侍太上迄至于今凡是衆仙朝會諸天敷奏自有眞儀適見金闕郎中引一靈官至瑶池前奏對進函逡廵而去喜愚昧不敏伏願聖慈曲垂宣示老君曰汝能發問吾願應機此乃世間劔州臨津縣奉道佩籙修金丹弟子王法進修靈寳天公道場齋一曰一夜言功拜章飛龍驛騎騰逹上奏至于頂門是時金關郎中依儀引見故也老君曰夫天公齋者出於九等齋科告謝之格所以世間善信男女悟大道生成感乾坤覆𢧐二元上燭五行下滋寒暑相推水火相濟分五土之利順四時之宜上奉天眞下滋長㓜一家冨樂萬類從心神明護門邪精伏匿毎六齋十直之月選擇良辰精潔宅字法天像地懸像掛旙建設道場中設三淸玉皇次設十方上聖五方五帝三元三官三十二天天皇地后諸天列宿三界群仙風伯兩師雷公電毋虛空監察太歳尊神伏羲神農左社右稷財庫保命延生名山大川五嶽四瀆四直使者土地靈官奏事監官衞璮場將吏一家精潔冥掛至誠請正一三洞法師或三人五人七人或一曰或三日以時新五果茶酒香華蘋藻齋羞淨巾鎭信銀錢雲馬命米紋繒然燈燒香依法行道壇場告畢言功賞眞拜表投詞仰祈福祐以憑四直使者上章詞靈官奏事監官驛龍騎吏騰逹章表上奏三淸三淸録言舉功遷善勑下三官九府五帝考官彼境仙官城隍杜令司命司録土地之神咸奉天符擁護修齋之所以此之故故有是焉尹喜眞人與諸仙衆一切禮謝重白老君曰靈寳天公齋者果感靈驗深不可詳未委此齋由何而有喜愚未悟願聞聖言老君曰吾昔在三淸境上觀見世間一切衆生因時澆瀉大樸漸散下民失道邪風勃行不敬二儀猒患風兩棄賤百榖枉費絲綿不孝不慈不仁不義專事邪教妄祀鬼神嫉賢垢能慳貪媱欲不崇大道害物傷生致使鬼神害盈天地降丧水火相繼五榖不滋疫毒流行瘟魔競起萬民塗炭怨天尤地哀愍衆生不悟罪福遂說三十六部尊經演三洞上淸寳符設九等齋科述九轉丹訣俾一切衆生因經悟道佩籙除邪持齎窻眞修眞鍊行歸眞得道乃長生夫三十六部尊經者太上靈寳洞眞十二部也太上靈寳洞玄十二部也太上靈寳洞神十二部也凡三十六部計一百八十八萬四千二百二十卷洞眞十二部者言天地造化隂陽岀沒九轉還丹金液鍊形飛仙之道也洞玄十二部者言消災治病謝過祈禳濟度薦拔存亡之道也洞神十二部者言治國治家修身之道也三洞靈符者上清部中法部正一部也九等齋科者三九二十七等也太眞齎金籙齋玉籙齋明眞齋自然齎黃籙齋三元齋塗炭齋洞神齋神呪齋九天齋指教齎正一齋天寳齋九幽齋五鍊齋太平齋太一齋八帝齋三皇齋上淸齋大洞齋金房齎北帝齋五帝齋化胡齋靈寳齋天公齋皆因其事隨而修之惟金籙玉籙九天齋者是帝王之齋非臣庶所修也黃籙齋者則廣救三塗遐被群有薦拔存歿也靈寳天公齋者則荷大道生成酬乾坤覆載解百生過咎祈未來福祥希風雨順時百榖豊稔除瘟滅毒降福延齡凡修此齋者切須滌慮凝神効心誠懇福徳立降如響應聲也是時老君重謂君喜曰昔我祖師太上元始天尊與玉晨大道君處三清之上觀見西域于闐等八十一國禀西方金精之氣其臭羶其性獷烈躭婬好殺殘害生靈不君不臣不父不子酷虐無量罪業轉深吾受元始大道金口之言令往西域化胡至函谷關汝爲關吏吾見汝性命合道專一崇眞遂授金丹於汝千日功就期於大蜀普羊肆與汝白日昇天經歷九天上朝玉皇汝雖得道未暁元始大道㣲妙通變之由汝當至心當爲汝說昔天地未分日月未明星辰未敷萬物未眹浩浩蕩蕩沌沌蒙䝉於是元始天尊生於天地之先無祖無宗凝然獨化無名無象㣲妙玄通變化無窮深不可測遂生一氣孕育五行五行相生院生天地天地既判動植流形故天得一氣上澄爲天地得一氣下凝爲地中和一氣化生萬靈日生於陽精月生於隂魄安東斗於東方五行屬木主奉發生設南斗於南方五行屬火主夏長養布西斗於西方五行屬金主秋成熟建九斗於北方五行屬木主冬收藏排中斗於中央五行属土主於四季萬物得土自然化生五斗旣敷衆星列位天文垂象而豈徒哉明顯木火金丹之道見之者昌爾時老君而說讃曰天地之前元始上仙無宗無祖獨化凝然孕生一氣五行爲先濁氣爲地淸氣爲天中和爲人散爲山川星辰列布日月髙懸木星東上金星西邊北斗坎位南斗離偏春夏秋冬逓互推遷金自水生與木相連火生其土相逆相憐九還七返配之在天見之者昌鍊之者仙至道深妙玄之又玄老君曰元始天尊以一炁生三炁三炁生九炁三炁者玄元始也以玄一之炁化爲玉清聖境大羅之天瓊樓寳殿玄都玉京紫嶽宫闕太上元始天尊都馬號龍漢之劫又以元一之氣化爲上清眞境禹餘之天玉樓瓊殿寳樹爲林玉晨大道君都焉時號赤明中劫是時太上道君師資元始天尊元始天尊於始青天中召十方無極聖衆於寳林之內證度説法傳道又以始一之炁化爲太淸仙境珠樓金關七寳爲殿是吾之處也時號開皇今劫吾又師資玉晨大道君其三淸三聖各相去一劫化生號三清上境大羅天中玄都玉京也又三炁各生三炁化成九炁以成九天三清之外又列九天九天帝君居馬九天仙號曰第一鬰星無量天第二上上襌善無量壽天第三梵監須延天第四寂然兜術天第五波羅尼宻不驕樂天第六洞元化應聲天第七靈化梵輔天第八髙虛淸明天第九無想無結無愛天九天之外別有三十二天三十二天帝居焉東方八天仙號曰太皇黃曽天太明玉完天淸明何童天玄胎平育天虛無越𢖍天太極濛翳天元明文舉天上明七曜摩夷天南方八天仙號曰赤明和陽天玄明恭華天耀明宗飄天竺落星笳天虛明堂曜天觀明端靖天玄明恭慶天太煥極瑶天西方八天仙號曰元載孔昇天太安皇崖天顯定極風天始皇孝芒天太皇翁重浮容天無思江由天上揲阮樂天無極曇誓天北方八天仙號曰皓庭霄度天淵通元洞天太文輸寵妙成天太素秀樂禁上天太虛无上常融天太釋玉隆騰勝天龍變梵度天太極平育賈奕天雖有諸天猶拘劫運於是玉晨道君撰元始靈書四篇凝雲作篆毎字方廣一丈八角垂芒一篇鎭東方八天一篇鎭南方八天一篇鎭西方八天一篇鎭北方八天以此保制劫運使天長存東方八天靈書曰亶婁阿薈無惒觀音須延明首法攬菩曇稼那阿奕忽訶流吟華都曲麗鮮菩育臻荅落大梵散煙慶雲飛灑玉都明魔上門無行上首回蹠流玄阿陀龍羅四象吁員南方八天靈書曰南閻洞浮玉眸詵詵梵形落空九靈惟前澤洛菩臺緑羅大千渺莾九醜韶謡縁邅雲上九都飛生自騫那育都馥摩羅法輪霐持無鏡攬姿運容馥朗廓奕神縷自宫西方八天靈書曰刀利禪猷姿泥咎通宛藪滌色太眇之堂流羅梵萌量蔚蕭嵎易邈無寂宛首少都阿濫郁竺華莫延由九開自辯阿那品首無量扶蓋浮羅合神玉證長桑相空度仙北方八天靈書曰玃無自育九日導乾坤毋東覆形攝上玄陁羅育邈眇氣合雲飛天大醜緫監上天沙陁劫量龍漢瑛鮮碧落浮黎空歌保珍惡奕無品洞妙自眞元梵恢漠幽寂度人由是曰月運行星辰列照五行迭用四序調流一畫一夜一寒一暑雷公電毋風伯雨師仰順天常各司其局讃曰玄元始炁自道而生三炁變化化爲玉京瓊樓玉殿寳樹崢嶸大羅天主三清都馬三清仕師三劫乃全三炁仍引又生九天九天應變三十二天七寳爲殿鎭玉之爲保制劫運使天長年曰月運轉星宿聮綿五行無忒四氣相宣一晝一夜無黨無偏雷公電毋風伯兩師奉承天命各司其司玉燭既調萬物咸滋至道天地功深無私太上洞神天公消魔護國經卷中
