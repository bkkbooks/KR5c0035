front:
  text: 太上洞神天公消魔護國經卷上
  hash: sha256:1ab7ac577057958d6abd100d4882a773a9becae05ab2c997ce740ef6bd3021a7
body:
  text: 開度品第一爾時元始天尊與諸天天帝十方至真無極大聖妙行真人十方得道諸大聖衆金童玉女太上三師侍衛衆真在玄都玉京山紫微宫內說法廣度一切衆生是時日月光照天地寧間天尊放五色光明遍照諸天無極世界上至三十二天下至幽冥地獄紳光照耀普濟無窮令幽顯衆生咸得安穩受諸快樂無有疾傷天香普熏祥風聿布飢餐金飯渴飮玉漿餓鬼窮魂皆得滿足神魂超度業報悉原地獄寧間仙階漸陟速得離苦面覩天尊上生華胥常居法會是時衆中有一真人名曰無極即從座起身披霞帔手執玉英嚴整衣冠恭敬作禮禮畢冥心長跪稽首上白天尊曰臣幸因前福得預斯㑹聞天尊金口敷闡妙門悉令大地幽顯一切衆生咸得安穩臣今觀見下方國土一切人民有種種諸惡或被水災或逢火難或有饑饉或有劫賊或遭時疫或遇大旱五穀不熟草木燋枯國界不安人民驚懼種種罪纍憂愍在心思欲救之為無方便臣今發願救理衆生上黷髙真曲垂方便道之利用生育為先乞濟衆生令免斯厄是時元始天尊語無極真人曰善哉善哉子今能為大地一切衆生發大誓願作大利益至心救護令免災厄利物之功深矣遠矣我今勑九天總統三界大魔三五將軍六甲神將天丁力士妙行真人慈悲真人玉清真人洞皇真人百千萬衆玉清神童二十萬衆天靈赤官功曹主簿長生司馬韓君丈人八百萬衆天仙地仙三十萬衆威劍神王攝毒神王消魔神王食邪紳王破魔神王飛仙神王百千萬衆禁戒三師雲雷風雨閃電諸神遊歷世間救諸厄難凡有衆生若遇水火之厄但能冥心至禱開轉此經若遇賊盜當轉此經若遭時疫當轉此經若遇大旱當轉此經國界不安當轉此經五穀不熟當轉此經萬事不諧當轉此經此經若有書寫供養之人自感九天總統三界大魔三五將軍六甲神將天丁力士妙行真人慈悲玉清洞皇真人玉清神童功曹主簿長生司馬天仙神仙咸劍紳王消魔攝毒食邪食鬼破魔收瘟飛仙神王禁戒三師風伯雨師雷公電毋千乘萬騎浮空而來雲集轉經之所乃獲無量之福是諸惡毒悉皆消滅是諸惡賊悉皆破散是諸疫毒自得消除水災火厄自然止息國界不安當得寧靜四夷歸湊異國來朝疫病差除口舌消滅官橫枷鎖速得解散伏連斷絶邪魔不興是時無極真人又白天尊曰天下之內一切衆生時遭炎早如此熱惱作何方法乃得風雨調和五穀豐熟天尊語無極真人曰子今受吾教法勤而行之可於髙山或在水岸或在洞穴巖前或在清淨之地或於觀宇或在家庭建立壇場安置尊像懸諸旙蓋五色旌幢雜色寶蓋燃燈燒香沐浴齊戒以諸花果供養廣為演說啓設壇場轉經行道上獻三清上聖玉皇大天帝十方靈寶無量天尊三十二天帝天父地毋三官五帝九天五斗九曜衆星及諸仙衆一切靈官并諸龍神作大利益天尊當遣飛天神王五帝太魔風伯雨師典雷動霧巡繞世界須臾之間即令風雨應祈江河溪澗上下田疇令得普潤草木叢林一切花果五榖之類悉皆生成枝葉茂盛元始天尊即說讃曰北風飄飄至西雲鬱鬱來南丹鳳風翔東九龍徘徊真人奉天符部領天雨雷來蓋昆崙上普潤諸苦黃是時無極真人重告天尊曰臣從無量劫來稀見難遇令曰得聞微妙經典及救治一切衆生種種變化不可思議是經當何名之臣等如何受持天尊曰此經名曰太上靈寶天公消魔護國經开度品子好宣傳恭敬消戴若有愚人輕賤當墮惡道長夜受苦是時座中天人仙衆悉皆奉受作禮而去太上洞神天公消魔護國經卷上
